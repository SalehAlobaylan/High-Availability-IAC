AWSTemplateFormatVersion: "2010-09-09"
Description: Saleh Alobaylan - Infrastructure as Code Project - App Stack

Parameters:
  EnvironmentName:
    Type: String
    Default: app
    Description: Environment name used for tagging and imports.
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: Use only lowercase letters, numbers, and hyphens.

  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type for the web servers.

  VolumeSize:
    Type: Number
    Default: 10
    MinValue: 10
    Description: Root EBS volume size in GB (must be 10 or more).

  AsgDesiredCapacity:
    Type: Number
    Default: 4
    MinValue: 1
    Description: Desired (and fixed min/max) number of web servers.

  UbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/jammy/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: SSM parameter for the latest Ubuntu 22.04 (Jammy) AMI ID.

Resources:
  StaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-${AWS::AccountId}-${AWS::Region}-app-static"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource: !Sub "${StaticBucket.Arn}/*"

  WebAppRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: AppStaticBucketRW
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt StaticBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${StaticBucket.Arn}/*"

  WebAppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref WebAppRole

  WebServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from the Load Balancer only
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-web-sg"

  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP to the Load Balancer
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb-sg"

  WebServerIngressFromLB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow HTTP from the ALB security group
      GroupId: !Ref WebServerSecGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref LBSecGroup

  LBEgressToWebServers:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: Allow ALB to reach web servers on HTTP
      GroupId: !Ref LBSecGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      DestinationSecurityGroupId: !Ref WebServerSecGroup

  WebAppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      Scheme: internet-facing
      SecurityGroups:
        - !Ref LBSecGroup
      Subnets:
        - Fn::ImportValue: !Sub "${EnvironmentName}-PUB1-SN"
        - Fn::ImportValue: !Sub "${EnvironmentName}-PUB2-SN"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb"

  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"
      Port: 80
      Protocol: HTTP
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: "200"

  WebAppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebAppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup

  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref UbuntuAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref WebAppInstanceProfile
        SecurityGroupIds:
          - !Ref WebServerSecGroup
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref VolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail

            apt-get update -y
            apt-get install -y nginx awscli
            systemctl enable nginx
            systemctl start nginx

            cat > /usr/local/bin/app-sync.sh <<'SCRIPT'
            #!/bin/bash
            set -euo pipefail
            AWS_BIN="$(command -v aws || true)"
            if [[ -z "${AWS_BIN}" ]]; then
              echo "ERROR: aws CLI not found on instance" >&2
              exit 1
            fi

            mkdir -p /var/www/html

            # Retry because IMDS/IAM creds can take a moment to become available on new instances.
            for attempt in 1 2 3 4 5; do
              if "${AWS_BIN}" s3 sync "s3://${StaticBucket}" /var/www/html --region ${AWS::Region}; then
                break
              fi
              sleep $((attempt * 5))
            done

            # Ensure nginx serves our content even if its default index file is preferred.
            if [[ -f /var/www/html/index.html ]]; then
              cp /var/www/html/index.html /var/www/html/index.nginx-debian.html
            fi
            SCRIPT
            chmod +x /usr/local/bin/app-sync.sh

            /usr/local/bin/app-sync.sh >> /var/log/app-sync.log 2>&1

            cat > /etc/cron.d/app-sync <<'CRON'
            * * * * * root /usr/local/bin/app-sync.sh >> /var/log/app-sync.log 2>&1
            CRON

  WebAppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${EnvironmentName}-PRIV1-SN"
        - Fn::ImportValue: !Sub "${EnvironmentName}-PRIV2-SN"
      LaunchTemplate:
        LaunchTemplateId: !Ref WebAppLaunchTemplate
        Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
      MinSize: !Ref AsgDesiredCapacity
      MaxSize: !Ref AsgDesiredCapacity
      DesiredCapacity: !Ref AsgDesiredCapacity
      TargetGroupARNs:
        - !Ref WebAppTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 60
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-web"
          PropagateAtLaunch: true

Outputs:
  WebAppURL:
    Description: Public URL of the Application Load Balancer
    Value: !Sub "http://${WebAppLoadBalancer.DNSName}"

  StaticBucketName:
    Description: S3 bucket name for static content
    Value: !Ref StaticBucket
